parser:
  _target_: py123d.parser.ncore.ncore_parser.NCoreParser
  _convert_: 'all'

  splits: ["ncore_train"]
  ncore_data_root: ${dataset_paths.ncore_data_root}
  max_clips: null

  # Streaming mode — download each clip to a temp directory at parse time and delete it
  # afterwards. Use when disk is tight or you want to convert a one-off subset without
  # committing the full ~2.4 TB to permanent storage.
  #
  # When `stream_enabled: true`:
  #   - `ncore_data_root` is ignored for clip discovery
  #   - each ray worker streams its clips independently
  #   - cleanup happens per clip, right after its Arrow log finishes writing
  stream_enabled: false
  stream_clip_ids: null          # optional list of UUIDs; when null, fetch the full HF catalog
  stream_hf_token: null          # falls back to $HF_TOKEN / $HUGGINGFACE_HUB_TOKEN
  stream_revision: "main"
  stream_modality: "all"         # "all" | "metadata" | "lidar" | "cameras"
  stream_cameras: null           # only honored when stream_modality == "cameras"
  stream_temp_dir: null          # null → system temp
  stream_max_workers: 4

log_writer_config:
  _target_: py123d.api.scene.arrow.utils.log_writer_config.LogWriterConfig
  _convert_: 'all'

  force_log_conversion: ${force_log_conversion}
  force_map_conversion: ${force_map_conversion}
  async_conversion: ${async_conversion}

  camera_store_option: "jpeg_binary" # "path", "jpeg_binary", "png_binary", "mp4"
  lidar_store_option: "binary" #  "path", "binary"
  lidar_codec: "draco" # None or "laz", "draco", "ipc_zstd", "ipc_lz4", "ipc"

  infer_ego_dynamics: true
  infer_box_dynamics: true

log_writer:
  _target_: py123d.api.scene.arrow.arrow_log_writer.ArrowLogWriter
  _convert_: 'all'
  log_writer_config: ${dataset.log_writer_config}
  logs_root: ${dataset_paths.py123d_logs_root}
  sensors_root: ${dataset_paths.py123d_sensors_root}
  ipc_compression: null
  ipc_compression_level: null

  sync_config:
    _target_: py123d.api.scene.arrow.arrow_log_writer.SyncConfig
    _convert_: 'all'
    reference_column: lidar.lidar_merged.timestamp_us
    direction: "forward" # "forward" or "backward"

map_writer:
  _target_: py123d.api.map.arrow.arrow_map_writer.ArrowMapWriter
  _convert_: 'all'
  force_map_conversion: ${force_map_conversion}
  maps_root: ${dataset_paths.py123d_maps_root}
  logs_root: ${dataset_paths.py123d_logs_root}
