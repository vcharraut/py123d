parser:
  _target_: py123d.parser.wod.wod_motion_parser.WODMotionParser
  _convert_: 'all'

  splits: ["wod-motion_val", "wod-motion_train", "wod-motion_test"]
  wod_motion_data_root: ${dataset_paths.wod_motion_data_root}
  add_dummy_lane_groups: false
  skip_maps: false        # when true, get_map_parsers() returns [] — saves disk when tight
  skip_logs: false        # when true, get_log_parsers() returns [] — for maps-only runs

  # Streaming mode — download selected scenario shards from Google Cloud Storage into a temp
  # directory at parser construction time. The temp dir is cleaned up when the parser is
  # garbage collected. Requires `pip install py123d[womd-download]`.
  #
  # When `stream_enabled: true`:
  #   - `wod_motion_data_root` is ignored
  #   - shards land under a tempfile.TemporaryDirectory mimicking the local layout
  #   - `stream_shard_indices` (per-split) takes precedence over `stream_num_shards`
  stream_enabled: false
  stream_shard_indices: null     # e.g. {training: [0, 1, 2], validation: [0]}
  stream_num_shards: null        # first N per split, or N random if stream_random=true
  stream_random: false
  stream_seed: 0
  stream_version: "1.3.0"        # use dots; Hydra parses "1_3_0" as the int 130
  stream_credentials_file: null  # service-account JSON; null → Application Default Credentials
  stream_temp_dir: null          # null → system temp
  stream_max_workers: 4

log_writer_config:
  _target_: py123d.api.scene.arrow.utils.log_writer_config.LogWriterConfig
  _convert_: 'all'

  force_log_conversion: ${force_log_conversion}
  force_map_conversion: ${force_map_conversion}

  infer_ego_dynamics: true
  infer_box_dynamics: false

log_writer:
  _target_: py123d.api.scene.arrow.arrow_log_writer.ArrowLogWriter
  _convert_: 'all'
  log_writer_config: ${dataset.log_writer_config}
  logs_root: ${dataset_paths.py123d_logs_root}
  sensors_root: ${dataset_paths.py123d_sensors_root}
  ipc_compression: null
  ipc_compression_level: null

map_writer:
  _target_: py123d.api.map.arrow.arrow_map_writer.ArrowMapWriter
  _convert_: 'all'
  force_map_conversion: ${force_map_conversion}
  maps_root: ${dataset_paths.py123d_maps_root}
  logs_root: ${dataset_paths.py123d_logs_root}
