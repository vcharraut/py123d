parser:
  _target_: py123d.parser.wod.wod_perception_parser.WODPerceptionParser
  _convert_: 'all'

  splits: ["wod-perception_val", "wod-perception_train", "wod-perception_test"]
  wod_perception_data_root: ${dataset_paths.wod_perception_data_root}
  zero_roll_pitch: true
  keep_polar_features: false
  add_map_pose_offset: true
  add_dummy_lane_groups: false

  # Streaming mode — download selected perception segments from Google Cloud Storage into
  # a temp directory at parser construction time. The temp dir is cleaned up when the parser
  # is garbage collected. Requires `pip install py123d[waymo]`.
  #
  # NOTE: unlike the motion bucket, the perception bucket is NOT anonymously readable —
  # an authenticated GCS client is required (`gcloud auth application-default login`
  # or `stream_credentials_file: path/to/service-account.json`).
  #
  # WARNING: Perception segments are ~1 GB each. A small stream_num_shards value already
  # implies multiple GB of download traffic.
  #
  # When `stream_enabled: true`:
  #   - `wod_perception_data_root` is ignored
  #   - segments land under a tempfile.TemporaryDirectory mimicking the local layout
  #   - `stream_shard_indices` (per-split) takes precedence over `stream_num_shards`
  stream_enabled: false
  stream_shard_indices: null     # e.g. {training: [0, 1, 2], validation: [0]}
  stream_num_shards: null        # first N per split, or N random if stream_random=true
  stream_random: false
  stream_seed: 0
  stream_version: "1.4.3"        # use dots; Hydra parses "1_4_3" as the int 143
  stream_credentials_file: null  # service-account JSON; null → Application Default Credentials
  stream_temp_dir: null          # null → system temp
  stream_max_workers: 4

log_writer_config:
  _target_: py123d.api.scene.arrow.utils.log_writer_config.LogWriterConfig
  _convert_: 'all'

  force_log_conversion: ${force_log_conversion}
  force_map_conversion: ${force_map_conversion}

  camera_store_option: "jpeg_binary" # "path", "jpeg_binary", "png_binary", "mp4"

  lidar_store_option: "binary" #  "path", "binary"
  lidar_codec: "laz" # None or "laz", "draco", "ipc_zstd", "ipc_lz4", "ipc"

  infer_ego_dynamics: true
  infer_box_dynamics: true

log_writer:
  _target_: py123d.api.scene.arrow.arrow_log_writer.ArrowLogWriter
  _convert_: 'all'
  log_writer_config: ${dataset.log_writer_config}
  logs_root: ${dataset_paths.py123d_logs_root}
  sensors_root: ${dataset_paths.py123d_sensors_root}
  ipc_compression: null
  ipc_compression_level: null

  sync_config:
    _target_: py123d.api.scene.arrow.arrow_log_writer.SyncConfig
    _convert_: 'all'
    reference_column: lidar.lidar_merged.timestamp_us
    direction: "forward" # "forward" or "backward"

map_writer:
  _target_: py123d.api.map.arrow.arrow_map_writer.ArrowMapWriter
  _convert_: 'all'
  force_map_conversion: ${force_map_conversion}
  maps_root: ${dataset_paths.py123d_maps_root}
  logs_root: ${dataset_paths.py123d_logs_root}
